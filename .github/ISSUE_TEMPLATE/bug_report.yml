name: Bug report
description: jacet produces incorrect or unexpected output
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please provide a **minimised**
        reproduction — the smallest Java snippet that shows the issue. Large
        pastes or whole files make triage much slower.

  - type: input
    id: version
    attributes:
      label: jacet version
      description: Output of `jacet --version`, or the commit SHA if built from source.
      placeholder: e.g. 0.1.0 or commit abc1234
    validations:
      required: true

  - type: dropdown
    id: invocation
    attributes:
      label: How was jacet invoked?
      options:
        - CLI (jacet-cli)
        - Gradle plugin (plugin-gradle)
        - IDE integration
        - Other (describe below)
    validations:
      required: true

  - type: textarea
    id: input
    attributes:
      label: Input Java source
      description: Paste the minimised input here. Will be rendered as a code block.
      render: java
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected output
      render: java
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual output
      render: java
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS and JDK version (`java -version`). Only needed if the bug seems environment-specific.
      placeholder: |
        OS: macOS 15.3
        JDK: Temurin 25.0.1
    validations:
      required: false
